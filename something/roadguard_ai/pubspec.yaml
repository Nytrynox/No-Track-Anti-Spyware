name: roadguard_ai
description: "AI-powered road safety companion for motorcycle riders"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # Camera & Vision
  camera: ^0.11.0
  tflite_flutter: ^0.11.0
  image: ^4.3.0
  google_mlkit_object_detection: ^0.13.0
  
  # Location & Maps
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  
  # Sensors
  sensors_plus: ^6.1.0
  
  # Alerts
  vibration: ^2.0.0
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0
  
  # State Management
  provider: ^6.1.2
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  
  # Networking
  http: ^1.2.2
  
  # UI
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  
  # Utils
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.10
  share_plus: ^10.1.4
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/sounds/
    - assets/images/
